<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Evil Maze</title>

<style>
html, body {
margin: 0;
padding: 0;
}

body{
margin:0;
padding:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* Animated horror background */

body{
background:linear-gradient(180deg,#000,#200000,#000);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* Title */

h1{
margin-top:0;
padding-top:40px;
font-size:70px;
color:#ff0000;
text-shadow:
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000,
0 0 80px #ff0000;
letter-spacing:6px;
}

/* Slogan */

.slogan{
color:#ff4d4d;
font-size:22px;
margin-bottom:40px;
}

/* Fog effect */

.fog{
position:fixed;
width:100%;
height:100%;
background:url("https://media.gq.com/photos/588bd67c79e84b2b4b313562/master/pass/RESIDENT-EVIL-7.jpg");
opacity:0.1;
animation:fogmove 40s linear infinite;
z-index:-1;
}

@keyframes fogmove{
0%{background-position:0 0;}
100%{background-position:1000px 0;}
}

/* Booking box */

.box{
background:#111;
width:360px;
margin:auto;
padding:35px;
border-radius:10px;
box-shadow:0 0 30px red;
}

input,select{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:6px;
}

/* Button */

button{
padding:14px 30px;
background:red;
border:none;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
box-shadow:0 0 15px red;
}

button:hover{
background:#ff1a1a;
box-shadow:0 0 25px red;
}

/* Monster warning */

.warning{
margin-top:40px;
color:#ff3333;
font-size:18px;
}

footer{
margin-top:60px;
color:#777;
}

</style>
</head>

<body>

<div class="fog"></div>

<h1>EVIL MAZE</h1>

<p class="slogan">Don't let your fear help the demon catch you</p>

<div class="box">

<h2>Book Your Nightmare</h2>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email" required>

<select>
<option>Number of Players</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<input type="date">

<button>Enter The Maze</button>

</form>

</div>

<p class="warning">
⚠ Enter at your own risk. The demon is always watching.
</p>

<footer>
<p>© Evil Maze Horror Experience</p>
</footer>

</body>
</html>
